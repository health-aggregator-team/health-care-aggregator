<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Aggregator Dashboard</title>
    <!-- Modern typography from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header>
            <div class="brand">
                <div class="pulse-dot" id="system-pulse"></div>
                <h1>Health Aggregator</h1>
            </div>
            <button class="refresh-btn" onclick="checkHealth(); loadLogs();">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-12.28l5.67 5.67"/>
                </svg>
                <span>Synchronize</span>
            </button>
        </header>

        <!-- Dynamic Grid of Metrics -->
        <section class="metrics-grid">
            <div class="metric-card" id="card-status">
                <div class="icon-wrapper">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h3>System Status</h3>
                <div class="value" id="status">Loading...</div>
                <div class="subtitle">Global Health Check</div>
            </div>

            <div class="metric-card">
                <div class="icon-wrapper">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/></svg>
                </div>
                <h3>Memory Usage</h3>
                <div class="value" id="memory">-- MB</div>
                <div class="subtitle">Node Process Allocation</div>
            </div>

            <div class="metric-card">
                <div class="icon-wrapper">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" y1="16" x2="6.01" y2="16"/><line x1="10" y1="16" x2="10.01" y2="16"/></svg>
                </div>
                <h3>Disk Capacity</h3>
                <div class="value" id="disk">-- %</div>
                <div class="subtitle">Simulated Array</div>
            </div>

            <div class="metric-card">
                <div class="icon-wrapper">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <h3>Uptime</h3>
                <div class="value" id="uptime">-- s</div>
                <div class="subtitle" id="time">Awaiting sync...</div>
            </div>
        </section>

        <!-- Log History Section -->
        <section class="logs-section">
            <div class="section-header">
                <h2>Diagnostic Logs</h2>
                <div class="badge badge-subtle">Last 10 entries</div>
            </div>
            <div class="table-container">
                <table id="logTable">
                    <thead>
                        <tr>
                            <th>Status Code</th>
                            <th>Memory Allocation</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dynamically populated rows go here -->
                        <tr>
                            <td colspan="3" class="text-center">Loading network telemetry...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
